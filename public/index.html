<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECE Voice Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111722;
    --surface2: #1a2233;
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --text: #e8f0fe;
    --muted: #6b7a99;
    --danger: #ff4d6d;
    --success: #00e5a0;
    --border: rgba(0,229,255,0.12);
    --glow: 0 0 24px rgba(0,229,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,20,0.85);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .logo-icon {
    width: 32px; height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-dot.active   { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .status-dot.listening{ background: var(--accent);  box-shadow: 0 0 8px var(--accent); animation: pulse 1s infinite; }
  .status-dot.speaking { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 0.6s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 260px 1fr;
    position: relative;
    z-index: 1;
  }

  /* ── Sidebar ───────────────────────────────────── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(17,23,34,0.5);
    overflow-y: auto;
  }

  .sidebar-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 8px 8px 4px;
    text-transform: uppercase;
  }

  .topic-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    text-align: left;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid transparent;
  }
  .topic-btn:hover  { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .topic-btn.active { background: rgba(0,229,255,0.08); color: var(--accent); border-color: rgba(0,229,255,0.25); }
  .topic-icon { font-size: 15px; width: 20px; text-align: center; }

  /* ── Chat area ─────────────────────────────────── */
  .chat-area {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 61px);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar       { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .msg { display: flex; gap: 14px; max-width: 780px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .ai-avatar {
    background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(123,97,255,0.2));
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }
  .user-avatar {
    background: rgba(123,97,255,0.2);
    border: 1px solid rgba(123,97,255,0.3);
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  .bubble { padding: 13px 16px; border-radius: 12px; font-size: 14px; line-height: 1.65; max-width: 640px; }
  .ai-bubble   { background: var(--surface);             border: 1px solid var(--border);              color: var(--text); }
  .user-bubble { background: rgba(123,97,255,0.15);      border: 1px solid rgba(123,97,255,0.25);      color: var(--text); }

  .bubble code     { font-family: 'Space Mono', monospace; font-size:12px; background: rgba(0,229,255,0.08); padding:2px 6px; border-radius:4px; color:var(--accent); }
  .bubble strong   { color: var(--accent); font-weight: 500; }

  /* image preview inside bubble */
  .bubble img.preview { max-width: 260px; max-height: 200px; border-radius: 8px; margin-top: 8px; display:block; border:1px solid var(--border); }

  /* ── Input area ────────────────────────────────── */
  .input-area {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    background: rgba(10,14,20,0.9);
    backdrop-filter: blur(12px);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(0,229,255,0.4); box-shadow: var(--glow); }

  #textInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #textInput::placeholder { color: var(--muted); }

  .btn {
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    padding: 8px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Mic */
  #micBtn { width:38px; height:38px; border:1.5px solid var(--border); color:var(--muted); border-radius:10px; }
  #micBtn:hover      { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.08); }
  #micBtn.recording  { border-color:var(--danger); color:var(--danger); background:rgba(255,77,109,0.1); animation:pulse 0.8s infinite; }

  /* Image upload btn */
  #imgBtn { width:38px; height:38px; border:1.5px solid var(--border); color:var(--muted); border-radius:10px; position:relative; }
  #imgBtn:hover     { border-color:var(--accent2); color:var(--accent2); background:rgba(123,97,255,0.08); }
  #imgBtn.has-image { border-color:var(--accent2); color:var(--accent2); background:rgba(123,97,255,0.15); }
  #fileInput { display:none; }

  /* Send */
  #sendBtn { width:38px; height:38px; background:var(--accent); color:var(--bg); border-radius:10px; font-size:16px; }
  #sendBtn:hover    { background:#33eaff; transform:scale(1.05); }
  #sendBtn:disabled { background:var(--surface2); color:var(--muted); transform:none; cursor:not-allowed; }

  /* Image preview badge */
  #imgPreviewBar {
    display:none;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
    padding:6px 12px;
    background:rgba(123,97,255,0.1);
    border:1px solid rgba(123,97,255,0.25);
    border-radius:10px;
    font-size:12px;
    font-family:'Space Mono',monospace;
    color:var(--accent2);
  }
  #imgPreviewBar img { width:36px; height:36px; object-fit:cover; border-radius:6px; }
  #imgPreviewBar button { background:none; border:none; color:var(--danger); cursor:pointer; font-size:14px; margin-left:auto; }

  .input-hint {
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--muted);
    margin-top:8px;
    font-family:'Space Mono',monospace;
    padding:0 4px;
  }

  /* Quick prompts */
  .quick-prompts { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .qp {
    font-size:12px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--muted);
    padding:5px 12px;
    border-radius:20px;
    cursor:pointer;
    transition:all 0.2s;
    font-family:'Space Mono',monospace;
  }
  .qp:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.06); }

  /* Typing indicator */
  .typing-indicator { display:flex; gap:4px; align-items:center; padding:4px 0; }
  .typing-indicator span { width:6px; height:6px; background:var(--muted); border-radius:50%; animation:typing 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
  @keyframes typing { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-5px);} }

  .ai-avatar.speaking { animation:speaking-glow 0.5s infinite alternate; }
  @keyframes speaking-glow { from{box-shadow:0 0 0 var(--accent);} to{box-shadow:0 0 12px var(--accent);} }

  .sidebar::-webkit-scrollbar       { width:3px; }
  .sidebar::-webkit-scrollbar-thumb { background:var(--surface2); }

  /* Error toast */
  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#1a0a10; border:1px solid var(--danger);
    color:var(--danger); font-family:'Space Mono',monospace; font-size:12px;
    padding:10px 20px; border-radius:10px; z-index:999;
    display:none; animation:fadeUp 0.3s ease;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    ECE_TUTOR
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">IDLE</span>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-label">Subjects</div>

    <button class="topic-btn active" onclick="setTopic(this,'Analog Electronics')">
      <span class="topic-icon">〜</span> Analog Electronics
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Digital Electronics')">
      <span class="topic-icon">#</span> Digital Electronics
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Signals & Systems')">
      <span class="topic-icon">∿</span> Signals & Systems
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Communication Systems')">
      <span class="topic-icon">📡</span> Communication Systems
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Electromagnetic Fields')">
      <span class="topic-icon">⊛</span> EM Theory
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Microwave Engineering')">
      <span class="topic-icon">⌥</span> Microwave Engg.
    </button>
    <button class="topic-btn" onclick="setTopic(this,'VLSI Design')">
      <span class="topic-icon">▦</span> VLSI Design
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Control Systems')">
      <span class="topic-icon">⟳</span> Control Systems
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Antenna & Wave Propagation')">
      <span class="topic-icon">↟</span> Antenna & Propagation
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Network Theory')">
      <span class="topic-icon">◉</span> Network Theory
    </button>
    <button class="topic-btn" onclick="setTopic(this,'Embedded Systems')">
      <span class="topic-icon">⬡</span> Embedded Systems
    </button>
    <button class="topic-btn" onclick="setTopic(this,'DSP')">
      <span class="topic-icon">≋</span> DSP
    </button>

    <div class="sidebar-label" style="margin-top:12px;">Voice</div>
    <div style="padding:8px 12px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Speech speed</div>
      <input type="range" min="0.5" max="1.8" step="0.1" value="1" id="rateSlider" style="width:100%;accent-color:var(--accent);">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:monospace;margin-top:3px;">
        <span>0.5×</span><span id="rateVal">1.0×</span><span>1.8×</span>
      </div>
    </div>
    <div style="padding:4px 12px 8px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Voice pitch</div>
      <input type="range" min="0.5" max="2" step="0.1" value="1" id="pitchSlider" style="width:100%;accent-color:var(--accent2);">
    </div>
    <button class="topic-btn" onclick="clearChat()" style="margin-top:8px;color:var(--danger);border-color:rgba(255,77,109,0.2);">
      <span class="topic-icon">✕</span> Clear chat
    </button>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="quick-prompts" id="quickPrompts"></div>

      <!-- Image preview bar -->
      <div id="imgPreviewBar">
        <img id="imgThumb" src="" alt="preview">
        <span id="imgName">image.png</span>
        <button onclick="clearImage()" title="Remove image">✕</button>
      </div>

      <div class="input-row">
        <textarea id="textInput" rows="1" placeholder="Ask about any ECE topic… or click mic to speak"></textarea>

        <!-- Image upload -->
        <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(event)">
        <button class="btn" id="imgBtn" title="Attach circuit/diagram image" onclick="document.getElementById('fileInput').click()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
          </svg>
        </button>

        <!-- Mic -->
        <button class="btn" id="micBtn" title="Click to speak" onclick="toggleMic()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v8a1 1 0 0 1-2 0V4zm6 8a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 12h-2z"/>
          </svg>
        </button>

        <!-- Send -->
        <button class="btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
          </svg>
        </button>
      </div>

      <div class="input-hint">
        <span id="topicLabel">TOPIC: ANALOG ELECTRONICS</span>
        <span>ENTER to send · SHIFT+ENTER new line · 📎 attach image</span>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API_BASE = '';   // same origin (server serves this file)
                       // Change to 'http://localhost:3000' if running separately

const TOPICS = {
  'Analog Electronics':        ['Explain BJT biasing', 'What is an op-amp?', 'Describe Class A amplifier'],
  'Digital Electronics':       ['Explain flip-flops', 'What is a Karnaugh map?', 'Describe CMOS logic'],
  'Signals & Systems':         ['What is convolution?', 'Explain Fourier Transform', 'LTI system basics'],
  'Communication Systems':     ['Explain AM vs FM', 'What is OFDM?', 'Describe PCM'],
  'Electromagnetic Fields':    ['State Maxwell\'s equations', 'Explain Gauss\'s law', 'What is skin effect?'],
  'Microwave Engineering':     ['What is a waveguide?', 'Explain S-parameters', 'Describe a klystron'],
  'VLSI Design':               ['Explain CMOS inverter', 'What is DRC?', 'Describe standard cell design'],
  'Control Systems':           ['Explain PID control', 'What is Bode plot?', 'Describe root locus'],
  'Antenna & Wave Propagation':['Explain radiation pattern', 'What is VSWR?', 'Describe Friis equation'],
  'Network Theory':            ['Explain Thevenin theorem', 'What are two-port networks?', 'Describe Z-parameters'],
  'Embedded Systems':          ['What is RTOS?', 'Explain I2C protocol', 'Describe ADC conversion'],
  'DSP':                       ['Explain DFT vs FFT', 'What is FIR filter?', 'Describe windowing techniques']
};

// ── State ─────────────────────────────────────────────────────────────────────
let currentTopic       = 'Analog Electronics';
let isRecording        = false;
let recognition        = null;
let speechSynth        = window.speechSynthesis;
let currentUtterance   = null;
let conversationHistory = [];
let pendingImageBase64 = null;   // base64 data URI of selected image

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, duration = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, duration);
}

// ── Topic ─────────────────────────────────────────────────────────────────────
function setTopic(btn, topic) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTopic = topic;
  document.getElementById('topicLabel').textContent = 'TOPIC: ' + topic.toUpperCase();
  updateQuickPrompts();
  addMessage('ai', `Switched to **${topic}**. What would you like to learn?`);
  speak(`Now tutoring ${topic}. What would you like to learn?`);
}

function updateQuickPrompts() {
  const qp = document.getElementById('quickPrompts');
  const prompts = TOPICS[currentTopic] || [];
  qp.innerHTML = prompts.map(p =>
    `<button class="qp" onclick="sendText('${p.replace(/'/g,"\\'")}'">${p}</button>`
  ).join('');
}

// ── Messages ──────────────────────────────────────────────────────────────────
function addMessage(role, text, isLoading = false, imageDataUrl = null) {
  const messages = document.getElementById('messages');
  const div      = document.createElement('div');
  div.className  = `msg ${role === 'user' ? 'user' : ''}`;

  const avatar   = document.createElement('div');
  avatar.className = `avatar ${role === 'ai' ? 'ai-avatar' : 'user-avatar'}`;
  if (role === 'ai') avatar.id = 'latestAiAvatar';
  avatar.textContent = role === 'ai' ? 'AI' : 'U';

  const bubble   = document.createElement('div');
  bubble.className = `bubble ${role === 'ai' ? 'ai-bubble' : 'user-bubble'}`;

  if (isLoading) {
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    div.id = 'loadingMsg';
  } else {
    let formatted = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
    bubble.innerHTML = formatted;
    if (imageDataUrl) {
      const img = document.createElement('img');
      img.src = imageDataUrl;
      img.className = 'preview';
      img.alt = 'attached image';
      bubble.appendChild(img);
    }
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function removeLoading() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = `status-dot ${state}`;
  const labels = { active:'READY', listening:'LISTENING', speaking:'SPEAKING', ''  :'IDLE' };
  txt.textContent = labels[state] ?? 'IDLE';
}

// ── Image handling ────────────────────────────────────────────────────────────
function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { showToast('Image too large (max 10 MB)'); return; }

  const reader = new FileReader();
  reader.onload = e => {
    pendingImageBase64 = e.target.result;
    document.getElementById('imgThumb').src = pendingImageBase64;
    document.getElementById('imgName').textContent = file.name;
    document.getElementById('imgPreviewBar').style.display = 'flex';
    document.getElementById('imgBtn').classList.add('has-image');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function clearImage() {
  pendingImageBase64 = null;
  document.getElementById('imgPreviewBar').style.display = 'none';
  document.getElementById('imgBtn').classList.remove('has-image');
  document.getElementById('imgThumb').src = '';
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendText(text) {
  document.getElementById('textInput').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('textInput');
  const text  = input.value.trim();
  if (!text && !pendingImageBase64) return;

  const userText  = text || '(image attached — please analyse)';
  const imageSnap = pendingImageBase64;

  input.value = '';
  input.style.height = 'auto';
  if (imageSnap) clearImage();

  await processMessage(userText, imageSnap);
}

async function processMessage(userText, imageBase64 = null) {
  if (currentUtterance) speechSynth.cancel();

  addMessage('user', userText, false, imageBase64);
  conversationHistory.push({ role: 'user', content: userText });

  addMessage('ai', '', true);
  setStatus('active');
  document.getElementById('sendBtn').disabled = true;

  try {
    const payload = {
      messages: conversationHistory,
      topic:    currentTopic,
    };
    if (imageBase64) payload.image = imageBase64;

    const res = await fetch(`${API_BASE}/api/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${res.status}`);
    }

    const data  = await res.json();
    const reply = data.reply || 'No response generated.';

    removeLoading();
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
    speak(reply.replace(/<[^>]+>/g,'').replace(/\*\*/g,'').replace(/`/g,''));

  } catch (err) {
    removeLoading();
    addMessage('ai', `⚠️ ${err.message}`);
    showToast(err.message);
  }

  document.getElementById('sendBtn').disabled = false;
  setStatus('');
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!speechSynth) return;
  speechSynth.cancel();
  const clean = text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .substring(0, 600);     // cap long replies for TTS

  currentUtterance       = new SpeechSynthesisUtterance(clean);
  currentUtterance.rate  = parseFloat(document.getElementById('rateSlider').value);
  currentUtterance.pitch = parseFloat(document.getElementById('pitchSlider').value);

  const voices    = speechSynth.getVoices();
  const preferred = voices.find(v => v.lang === 'en-IN')
    || voices.find(v => v.name.includes('Google') && v.lang.startsWith('en'))
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) currentUtterance.voice = preferred;

  currentUtterance.onstart = () => {
    setStatus('speaking');
    document.getElementById('latestAiAvatar')?.classList.add('speaking');
  };
  currentUtterance.onend = () => {
    setStatus('');
    document.getElementById('latestAiAvatar')?.classList.remove('speaking');
  };

  speechSynth.speak(currentUtterance);
}

// ── Speech recognition ────────────────────────────────────────────────────────
function toggleMic() {
  const hasSR = ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window);
  if (!hasSR) { showToast('Speech recognition not supported. Use Chrome.'); return; }

  if (isRecording) { recognition?.stop(); return; }

  const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang            = 'en-IN';
  recognition.interimResults  = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    setStatus('listening');
    speechSynth.cancel();
  };

  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('textInput').value = transcript;
    // Voice messages go through /api/chat-voice (same logic, named differently)
    processVoiceMessage(transcript);
  };

  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    setStatus('');
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    if (document.getElementById('statusText').textContent === 'LISTENING') setStatus('');
  };

  recognition.start();
}

async function processVoiceMessage(transcript) {
  document.getElementById('textInput').value = '';
  if (currentUtterance) speechSynth.cancel();

  addMessage('user', `🎙️ ${transcript}`);
  conversationHistory.push({ role: 'user', content: transcript });

  addMessage('ai', '', true);
  setStatus('active');
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/chat-voice`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ messages: conversationHistory, topic: currentTopic }),
    });

    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data  = await res.json();
    const reply = data.reply || 'No response generated.';

    removeLoading();
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
    speak(reply.replace(/<[^>]+>/g,'').replace(/\*\*/g,'').replace(/`/g,''));

  } catch (err) {
    removeLoading();
    addMessage('ai', `⚠️ ${err.message}`);
    showToast(err.message);
  }

  document.getElementById('sendBtn').disabled = false;
  setStatus('');
}

// ── Misc ──────────────────────────────────────────────────────────────────────
function clearChat() {
  document.getElementById('messages').innerHTML = '';
  conversationHistory = [];
  speechSynth.cancel();
  clearImage();
  init();
}

document.getElementById('rateSlider').addEventListener('input', function() {
  document.getElementById('rateVal').textContent = parseFloat(this.value).toFixed(1) + '×';
});

document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('textInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

if (speechSynth.onvoiceschanged !== undefined) speechSynth.onvoiceschanged = () => {};

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  updateQuickPrompts();
  addMessage('ai',
    `Welcome to **ECE Tutor**! 🎓\n\nI'm your AI tutor for Electronics & Telecommunication Engineering.\n` +
    `Ask me anything, speak via mic 🎙️, or attach a **circuit diagram / waveform image** 📎 for analysis.\n\n` +
    `Currently loaded: **${currentTopic}**. Pick a subject from the sidebar or dive right in!`
  );
  speak('Welcome to ECE Tutor! I am your AI tutor for Electronics and Telecommunication Engineering. Ask me anything!');
  setStatus('active');
  setTimeout(() => setStatus(''), 2000);
}

init();
</script>
