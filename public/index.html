<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETC AI Tutor — DRIEMS POLYTECHNIC</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  :root {
    --bg:       #06090f;
    --surface:  #0d1520;
    --surface2: #152033;
    --accent:   #00c853;
    --accent2:  #1a8cff;
    --text:     #e8f0fe;
    --muted:    #6b8099;
    --danger:   #ff4d6d;
    --success:  #00c853;
    --border:   rgba(0,200,83,0.14);
    --glow:     0 0 24px rgba(0,200,83,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,83,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,83,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  /* DRIEMS College Header */
  .college-header {
    position: relative;
    z-index: 20;
    background: #0a1628;
    border-bottom: 3px solid var(--accent);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .college-logo {
    height: 58px;
    width: auto;
    flex-shrink: 0;
    border-radius: 6px;
  }

  .college-info { display:flex; flex-direction:column; gap:3px; }

  .college-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 17px;
    color: #ffffff;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .college-name span { color: var(--accent); }

  .college-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #7aafd4;
    letter-spacing: 0.08em;
  }

  .college-badges {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid;
  }
  .badge-green { color:var(--accent); border-color:rgba(0,200,83,0.4); background:rgba(0,200,83,0.08); }
  .badge-blue  { color:#5ab4ff; border-color:rgba(90,180,255,0.35); background:rgba(90,180,255,0.08); }

  /* App header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,9,15,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .logo-icon {
    width: 32px; height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    background: rgba(0,200,83,0.08);
  }

  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.06em;
    margin-top: 1px;
  }

  .status-pill {
    display:flex; align-items:center; gap:6px;
    font-size:11px;
    font-family:'Space Mono',monospace;
    color:var(--muted);
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:5px 12px;
  }

  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition:all 0.3s; }
  .status-dot.active    { background:var(--success); box-shadow:0 0 8px var(--success); }
  .status-dot.listening { background:var(--accent2); box-shadow:0 0 8px var(--accent2); animation:pulse 1s infinite; }
  .status-dot.speaking  { background:var(--accent);  box-shadow:0 0 8px var(--accent); animation:pulse 0.6s infinite; }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 260px 1fr;
    position: relative;
    z-index: 1;
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(10,22,40,0.6);
    overflow-y: auto;
  }

  .sidebar-label {
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:0.12em;
    color:var(--muted);
    padding:8px 8px 4px;
    text-transform:uppercase;
  }

  .topic-btn {
    background:transparent;
    border:none;
    color:var(--muted);
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    text-align:left;
    padding:9px 12px;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.2s;
    display:flex; align-items:center; gap:10px;
    border:1px solid transparent;
  }
  .topic-btn:hover  { background:var(--surface2); color:var(--text); border-color:var(--border); }
  .topic-btn.active { background:rgba(0,200,83,0.08); color:var(--accent); border-color:rgba(0,200,83,0.28); }
  .topic-icon { font-size:15px; width:20px; text-align:center; }

  /* Chat */
  .chat-area {
    display:flex;
    flex-direction:column;
    height: calc(100vh - 176px);
  }

  .messages {
    flex:1;
    overflow-y:auto;
    padding:28px 32px;
    display:flex;
    flex-direction:column;
    gap:20px;
    scroll-behavior:smooth;
  }
  .messages::-webkit-scrollbar       { width:4px; }
  .messages::-webkit-scrollbar-track { background:transparent; }
  .messages::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:2px; }

  .msg { display:flex; gap:14px; max-width:780px; animation:fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .msg.user { align-self:flex-end; flex-direction:row-reverse; }

  .avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .ai-avatar   { background:linear-gradient(135deg,rgba(0,200,83,0.2),rgba(26,140,255,0.2)); border:1px solid rgba(0,200,83,0.35); color:var(--accent); font-family:'Space Mono',monospace; font-size:11px; }
  .user-avatar { background:rgba(26,140,255,0.18); border:1px solid rgba(26,140,255,0.3); color:var(--accent2); font-family:'Space Mono',monospace; font-size:11px; }

  .bubble { padding:13px 16px; border-radius:12px; font-size:14px; line-height:1.65; max-width:640px; }
  .ai-bubble   { background:var(--surface); border:1px solid var(--border); color:var(--text); }
  .user-bubble { background:rgba(26,140,255,0.12); border:1px solid rgba(26,140,255,0.25); color:var(--text); }

  .bubble code   { font-family:'Space Mono',monospace; font-size:12px; background:rgba(0,200,83,0.1); padding:2px 6px; border-radius:4px; color:var(--accent); }
  .bubble strong { color:var(--accent); font-weight:500; }
  .bubble img.preview { max-width:260px; max-height:200px; border-radius:8px; margin-top:8px; display:block; border:1px solid var(--border); }

  /* Input */
  .input-area {
    padding:16px 28px 20px;
    border-top:1px solid var(--border);
    background:rgba(6,9,15,0.95);
    backdrop-filter:blur(12px);
  }

  .input-row {
    display:flex; gap:10px; align-items:flex-end;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:10px 14px;
    transition:border-color 0.2s;
  }
  .input-row:focus-within { border-color:rgba(0,200,83,0.45); box-shadow:var(--glow); }

  #textInput { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; resize:none; max-height:120px; line-height:1.5; }
  #textInput::placeholder { color:var(--muted); }

  .btn { background:transparent; border:none; cursor:pointer; border-radius:8px; padding:8px; transition:all 0.2s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  #micBtn { width:38px; height:38px; border:1.5px solid var(--border); color:var(--muted); border-radius:10px; }
  #micBtn:hover     { border-color:var(--accent2); color:var(--accent2); background:rgba(26,140,255,0.08); }
  #micBtn.recording { border-color:var(--danger); color:var(--danger); background:rgba(255,77,109,0.1); animation:pulse 0.8s infinite; }

  #imgBtn { width:38px; height:38px; border:1.5px solid var(--border); color:var(--muted); border-radius:10px; }
  #imgBtn:hover     { border-color:var(--accent); color:var(--accent); background:rgba(0,200,83,0.08); }
  #imgBtn.has-image { border-color:var(--accent); color:var(--accent); background:rgba(0,200,83,0.12); }
  #fileInput { display:none; }

  #sendBtn { width:38px; height:38px; background:var(--accent); color:#06090f; border-radius:10px; font-size:16px; font-weight:700; }
  #sendBtn:hover    { background:#00e05c; transform:scale(1.05); }
  #sendBtn:disabled { background:var(--surface2); color:var(--muted); transform:none; cursor:not-allowed; }

  #imgPreviewBar {
    display:none; align-items:center; gap:8px; margin-bottom:8px;
    padding:6px 12px;
    background:rgba(0,200,83,0.08); border:1px solid rgba(0,200,83,0.22);
    border-radius:10px; font-size:12px; font-family:'Space Mono',monospace; color:var(--accent);
  }
  #imgPreviewBar img    { width:36px; height:36px; object-fit:cover; border-radius:6px; }
  #imgPreviewBar button { background:none; border:none; color:var(--danger); cursor:pointer; font-size:14px; margin-left:auto; }

  .input-hint { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:8px; font-family:'Space Mono',monospace; padding:0 4px; }

  .quick-prompts { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .qp { font-size:12px; background:var(--surface); border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:20px; cursor:pointer; transition:all 0.2s; font-family:'Space Mono',monospace; }
  .qp:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,200,83,0.06); }

  .typing-indicator { display:flex; gap:4px; align-items:center; padding:4px 0; }
  .typing-indicator span { width:6px; height:6px; background:var(--muted); border-radius:50%; animation:typing 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
  @keyframes typing { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-5px);} }

  .ai-avatar.speaking { animation:speaking-glow 0.5s infinite alternate; }
  @keyframes speaking-glow { from{box-shadow:0 0 0 var(--accent);} to{box-shadow:0 0 14px var(--accent);} }

  .sidebar::-webkit-scrollbar       { width:3px; }
  .sidebar::-webkit-scrollbar-thumb { background:var(--surface2); }

  /* Footer */
  footer {
    position: relative;
    z-index: 10;
    background: #060c14;
    border-top: 1px solid rgba(0,200,83,0.14);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .footer-logo { height:22px; width:auto; opacity:0.65; }

  .footer-text {
    font-family:'Space Mono',monospace;
    font-size:10px;
    color:var(--muted);
    letter-spacing:0.05em;
    text-align:center;
  }
  .footer-text a { color:var(--accent); text-decoration:none; }
  .footer-text a:hover { text-decoration:underline; }

  .footer-divider { width:1px; height:14px; background:var(--border); }

  /* ── AUTH SCREEN ── */
  #authScreen {
    position:fixed;inset:0;z-index:9999;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg);
    backdrop-filter:blur(0);
  }
  #authScreen::before {
    content:'';position:fixed;inset:0;z-index:0;
    background-image:
      linear-gradient(rgba(0,200,83,0.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,200,83,0.025) 1px,transparent 1px);
    background-size:44px 44px;pointer-events:none;
  }
  .auth-card {
    position:relative;z-index:1;
    background:var(--surface);border:1px solid rgba(0,200,83,0.25);
    border-radius:18px;padding:40px 36px;width:92%;max-width:420px;
    box-shadow:0 0 60px rgba(0,200,83,0.08);
    animation:fadeUp 0.5s ease both;
  }
  .auth-logo-row {
    display:flex;align-items:center;gap:10px;margin-bottom:6px;
  }
  .auth-logo-icon {
    width:38px;height:38px;border-radius:9px;
    background:rgba(0,200,83,0.12);border:1.5px solid rgba(0,200,83,0.4);
    display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  }
  .auth-logo-text {
    font-family:'Space Mono',monospace;font-size:1rem;color:var(--accent);letter-spacing:0.05em;
  }
  .auth-college {
    font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);
    letter-spacing:0.08em;margin-bottom:24px;
  }
  .auth-title {
    font-family:'Space Mono',monospace;font-size:1rem;color:var(--text);
    margin-bottom:4px;letter-spacing:0.04em;
  }
  .auth-sub {
    font-size:0.82rem;color:var(--muted);line-height:1.55;margin-bottom:26px;
  }
  .auth-sub strong{color:var(--accent);}

  .google-btn {
    width:100%;padding:12px;border-radius:10px;
    border:1px solid rgba(0,200,83,0.3);
    background:rgba(0,200,83,0.06);color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:all 0.2s;
  }
  .google-btn:hover{background:rgba(0,200,83,0.12);border-color:var(--accent);transform:translateY(-1px);}
  .google-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .g-icon{width:18px;height:18px;flex-shrink:0;}

  .auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
  .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .auth-divider span{font-size:0.68rem;color:var(--muted);font-family:'Space Mono',monospace;}

  .auth-input {
    width:100%;padding:11px 13px;border-radius:9px;
    border:1px solid var(--border);background:var(--surface2);
    color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;
    outline:none;transition:border-color 0.2s;margin-bottom:9px;
  }
  .auth-input:focus{border-color:rgba(0,200,83,0.45);box-shadow:var(--glow);}
  .auth-input::placeholder{color:var(--muted);}

  .auth-submit {
    width:100%;padding:12px;border-radius:9px;border:none;cursor:pointer;
    background:var(--accent);color:#06090f;
    font-weight:700;font-size:0.9rem;font-family:'DM Sans',sans-serif;
    transition:all 0.2s;margin-top:2px;
  }
  .auth-submit:hover{background:#00e05c;transform:translateY(-1px);}
  .auth-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .auth-toggle{text-align:center;margin-top:14px;font-size:0.8rem;color:var(--muted);}
  .auth-toggle button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.8rem;font-family:'DM Sans',sans-serif;font-weight:600;}

  .auth-msg{text-align:center;font-size:0.75rem;margin-top:10px;min-height:18px;font-family:'Space Mono',monospace;}
  .auth-msg.error{color:var(--danger);}
  .auth-msg.success{color:var(--success);}

  .auth-feats{margin-top:22px;padding-top:18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;}
  .auth-feat{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--muted);}
  .auth-feat-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}

  /* ── TRIAL / PAYMENT BAR ── */
  .trial-bar {
    display:flex;align-items:center;gap:10px;
    padding:5px 14px;background:rgba(0,200,83,0.06);
    border-bottom:1px solid var(--border);
    font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
    position:relative;z-index:10;
  }
  .trial-track{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
  .trial-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s;}
  #trialCount{color:var(--accent);font-weight:700;white-space:nowrap;}
  .upgrade-btn-small {
    padding:4px 12px;border-radius:6px;border:none;cursor:pointer;
    background:var(--accent);color:#06090f;font-size:10px;
    font-weight:700;font-family:'Space Mono',monospace;letter-spacing:0.05em;
    transition:all 0.15s;white-space:nowrap;
  }
  .upgrade-btn-small:hover{background:#00e05c;}

  /* ── PAYMENT MODAL ── */
  .pay-overlay{
    position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.75);
    backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;
    animation:fadeUp 0.2s ease;
  }
  .pay-overlay.hide{display:none;}
  .pay-modal{
    background:var(--surface);border:1px solid rgba(0,200,83,0.3);
    border-radius:18px;padding:36px;max-width:420px;width:92%;
    box-shadow:0 0 60px rgba(0,200,83,0.1);
    animation:fadeUp 0.3s ease;position:relative;
  }
  .pay-modal-close{
    position:absolute;top:12px;right:12px;
    width:28px;height:28px;border-radius:7px;border:none;
    background:rgba(255,255,255,0.06);color:var(--muted);cursor:pointer;font-size:0.9rem;
  }
  .pay-icon{font-size:2rem;margin-bottom:12px;}
  .pay-modal h2{font-family:'Space Mono',monospace;font-size:1.1rem;color:var(--accent);margin-bottom:6px;}
  .pay-modal p{font-size:0.84rem;color:var(--muted);line-height:1.55;margin-bottom:20px;}
  .pay-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
  .pay-price{font-family:'Space Mono',monospace;font-size:2.2rem;color:var(--accent);}
  .pay-old{font-size:0.95rem;color:var(--muted);text-decoration:line-through;}
  .pay-once{font-size:0.7rem;font-family:'Space Mono',monospace;color:var(--muted);margin-bottom:20px;letter-spacing:0.05em;}
  .pay-feats{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
  .pay-feat{display:flex;align-items:center;gap:9px;font-size:0.83rem;color:var(--muted);}
  .pay-check{color:var(--accent);}
  .pay-btn{
    width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
    background:var(--accent);color:#06090f;font-weight:700;font-size:0.95rem;
    font-family:'DM Sans',sans-serif;transition:all 0.2s;
  }
  .pay-btn:hover{background:#00e05c;transform:translateY(-1px);}
  .pay-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .pay-note{text-align:center;font-size:0.68rem;color:var(--muted);margin-top:10px;font-family:'Space Mono',monospace;}

  /* user pill in header */
  .user-pill{
    display:flex;align-items:center;gap:6px;
    padding:4px 10px 4px 7px;border-radius:20px;
    border:1px solid var(--border);background:var(--surface);
    font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  }
  .user-av{
    width:20px;height:20px;border-radius:50%;
    background:rgba(0,200,83,0.2);border:1px solid rgba(0,200,83,0.4);
    display:flex;align-items:center;justify-content:center;
    font-size:0.6rem;color:var(--accent);font-weight:700;
  }
  .signout-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    font-size:10px;font-family:'Space Mono',monospace;padding:4px 10px;
    border-radius:6px;cursor:pointer;transition:all 0.15s;
  }
  .signout-btn:hover{border-color:rgba(255,77,109,0.4);color:var(--danger);}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(6,9,15,0.3);border-top-color:#06090f;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg)}}

</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="authScreen">
  <div class="auth-card">

async function submitEmail() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn      = document.getElementById('emailSubmitBtn');
  if (!email || !password) { showAuthMsg('Please enter email and password.', 'error'); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  let result;
  if (authMode === 'signup') {
    result = await sb.auth.signUp({ email, password });
    if (!result.error && result.data.user && !result.data.session) {
      showAuthMsg('✓ Check your email to confirm your account!', 'success');
      btn.disabled = false; btn.textContent = 'Create Account'; return;
    }
  } else {
    result = await sb.auth.signInWithPassword({ email, password });
  }
  if (result.error) {
    showAuthMsg(result.error.message, 'error');
    btn.disabled = false;
    btn.textContent = authMode === 'signup' ? 'Create Account' : 'Sign In';
  }

  return true;
}

function consumeTrial() {
  if (!purchased) {
    trialLeft--;
    updateTrialUI();
    if (trialLeft <= 0) setTimeout(openPayModal, 2000);
  }
}

// ── UI helpers ────────────────────────────────────────
function showToast(msg, duration=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display='none'; }, duration);
}

function setTopic(btn, topic) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTopic = topic;
  document.getElementById('topicLabel').textContent = 'TOPIC: ' + topic.toUpperCase();
  updateQuickPrompts();
  addMessage('ai', `Switched to ${topic}. What would you like to learn?`);
}

function updateQuickPrompts() {
  const qp = document.getElementById('quickPrompts');
  const prompts = TOPICS[currentTopic] || [];
  qp.innerHTML = prompts.map(p =>
    `<button class="qp" onclick="sendText('${p.replace(/'/g,"\\'")}'">${p}</button>`
  ).join('');
}

function addMessage(role, text, isLoading=false, imageDataUrl=null) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role==='user'?'user':''}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role==='ai'?'ai-avatar':'user-avatar'}`;
  if (role==='ai') avatar.id = 'latestAiAvatar';
  avatar.textContent = role==='ai'?'AI':'U';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role==='ai'?'ai-bubble':'user-bubble'}`;
  if (isLoading) {
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    div.id = 'loadingMsg';
  } else {
    let cleaned = text
      .replace(/#{1,6}\s*/g, '')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
    bubble.innerHTML = cleaned;
    if (imageDataUrl) {
      const img = document.createElement('img');
      img.src = imageDataUrl; img.className = 'preview'; img.alt = 'attached';
      bubble.appendChild(img);
    }
  }
  div.appendChild(avatar); div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function removeLoading() { const el=document.getElementById('loadingMsg'); if(el) el.remove(); }

function setStatus(state) {
  const dot=document.getElementById('statusDot'), txt=document.getElementById('statusText');
  dot.className=`status-dot ${state}`;
  txt.textContent = {active:'READY',listening:'LISTENING',speaking:'SPEAKING','':'IDLE'}[state]??'IDLE';
}

function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 10*1024*1024) { showToast('Image too large (max 10 MB)'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    pendingImageBase64 = e.target.result;
    document.getElementById('imgThumb').src = pendingImageBase64;
    document.getElementById('imgName').textContent = file.name;
    document.getElementById('imgPreviewBar').style.display = 'flex';
    document.getElementById('imgBtn').classList.add('has-image');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function clearImage() {
  pendingImageBase64 = null;
  document.getElementById('imgPreviewBar').style.display = 'none';
  document.getElementById('imgBtn').classList.remove('has-image');
  document.getElementById('imgThumb').src = '';
}

async function sendText(text) { document.getElementById('textInput').value=text; sendMessage(); }

async function sendMessage() {
  if (!checkTrialGuard()) return;
  const input=document.getElementById('textInput');
  const text=input.value.trim();
  if (!text && !pendingImageBase64) return;
  const userText=text||'(image attached — please analyse)';
  const imageSnap=pendingImageBase64;
  input.value=''; input.style.height='auto';
  if (imageSnap) clearImage();
  consumeTrial();
  await processMessage(userText, imageSnap);
}

async function processMessage(userText, imageBase64=null) {
  if (currentUtterance) speechSynth.cancel();
  addMessage('user', userText, false, imageBase64);
  conversationHistory.push({role:'user', content:userText});
  addMessage('ai','',true);
  setStatus('active');
  document.getElementById('sendBtn').disabled = true;
  try {
    const payload = {messages:conversationHistory, topic:currentTopic};
    if (imageBase64) payload.image = imageBase64;
    const res = await fetch(`${API_BASE}/api/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    });
    if (!res.ok) { const err=await res.json().catch(()=>({})); throw new Error(err.error||`Server error ${res.status}`); }
    const data=await res.json();
    const reply=data.reply||'No response generated.';
    removeLoading();
    conversationHistory.push({role:'assistant',content:reply});
    addMessage('ai', reply);
  } catch(err) {
    removeLoading();
    addMessage('ai',`⚠️ ${err.message}`);
    showToast(err.message);
  }
  document.getElementById('sendBtn').disabled = false;
  setStatus('');
}

function speak(text) {
  if (!speechSynth) return;
  speechSynth.cancel();
  const clean = text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/`([^`]+)`/g,'$1').substring(0,600);
  currentUtterance = new SpeechSynthesisUtterance(clean);
  currentUtterance.rate  = parseFloat(document.getElementById('rateSlider').value);
  currentUtterance.pitch = parseFloat(document.getElementById('pitchSlider').value);
  const voices = speechSynth.getVoices();
  const preferred = voices.find(v=>v.lang==='en-IN')
    || voices.find(v=>v.name.includes('Google')&&v.lang.startsWith('en'))
    || voices.find(v=>v.lang.startsWith('en'));
  if (preferred) currentUtterance.voice = preferred;
  currentUtterance.onstart = () => { setStatus('speaking'); document.getElementById('latestAiAvatar')?.classList.add('speaking'); };
  currentUtterance.onend   = () => { setStatus(''); document.getElementById('latestAiAvatar')?.classList.remove('speaking'); };
  speechSynth.speak(currentUtterance);
}

function toggleMic() {
  if (!checkTrialGuard()) return;
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { showToast('Use Chrome for voice input.'); return; }
  if (isRecording) { recognition?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang='en-IN'; recognition.interimResults=false; recognition.maxAlternatives=1;
  recognition.onstart = () => { isRecording=true; document.getElementById('micBtn').classList.add('recording'); setStatus('listening'); speechSynth.cancel(); };
  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('textInput').value = transcript;
    consumeTrial();
    processVoiceMessage(transcript);
  };
  recognition.onerror = () => { isRecording=false; document.getElementById('micBtn').classList.remove('recording'); setStatus(''); };
  recognition.onend   = () => { isRecording=false; document.getElementById('micBtn').classList.remove('recording'); if(document.getElementById('statusText').textContent==='LISTENING') setStatus(''); };
  recognition.start();
}

async function processVoiceMessage(transcript) {
  document.getElementById('textInput').value = '';
  if (currentUtterance) speechSynth.cancel();
  addMessage('user', `🎙️ ${transcript}`);
  conversationHistory.push({role:'user', content:transcript});
  addMessage('ai','',true);
  setStatus('active');
  document.getElementById('sendBtn').disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/chat-voice`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages:conversationHistory, topic:currentTopic})
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data=await res.json();
    const reply=data.reply||'No response generated.';
    removeLoading();
    conversationHistory.push({role:'assistant',content:reply});
    addMessage('ai', reply);
    const spokenText = reply
      .replace(/#{1,6}\s*/g,'').replace(/\*\*(.*?)\*\*/g,'$1')
      .replace(/\*(.*?)\*/g,'$1').replace(/`([^`]+)`/g,'$1').replace(/\n/g,' ');
    speak(spokenText);
  } catch(err) {
    removeLoading(); addMessage('ai',`⚠️ ${err.message}`); showToast(err.message);
  }
  document.getElementById('sendBtn').disabled = false;
  setStatus('');
}

function clearChat() {
  document.getElementById('messages').innerHTML='';
  conversationHistory=[]; speechSynth.cancel(); clearImage(); init();
}

document.getElementById('rateSlider').addEventListener('input', function() {
  document.getElementById('rateVal').textContent = parseFloat(this.value).toFixed(1)+'×';
});
document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('textInput').addEventListener('input', function() {
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px';
});

if (speechSynth.onvoiceschanged !== undefined) speechSynth.onvoiceschanged = () => {};

function init() {
  updateQuickPrompts();
  addMessage('ai',
    `Welcome to ECE AI Tutor — DRIEMS Polytechnic!\n\n` +
    `I am your AI-powered tutor for Electronics and Telecommunication Engineering.\n` +
    `Ask me anything by typing, speak via mic, or attach a circuit diagram or waveform image.\n\n` +
    `Currently loaded: ${currentTopic}. Select a subject from the sidebar to begin!`
  );
  setStatus('active');
  setTimeout(() => setStatus(''), 2000);
}

init();
</script>
